name: Playwright Tests
on:
  push:
    branches: main
  pull_request:
    branches: main
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ui
          - api
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: |
          if [ "${{ github.event.inputs.suite }}" = "ui" ]; then
            npm run test:ui
          elif [ "${{ github.event.inputs.suite }}" = "api" ]; then
            npm run test:api
          else
            npm test
          fi
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
